<h1 id="1-%E3%83%95%E3%83%A9%E3%82%AF%E3%82%BF%E3%83%AB%E3%81%A8%E5%BE%AE%E7%A9%8D%E5%88%86%E3%81%AF%E7%9B%B8%E6%80%A7%E3%81%8C%E6%82%AA%E3%81%84">1. フラクタルと微積分は相性が悪い!</h1>
<p>今回の発表では、分数次元におけるフラクタルと微積分のつながりから<br />
「フラクタルと微積分が互いの問題の解決に有用である」ことを説明するが、</p>
<p>その前に、この2つの相性が悪いと一般的に言われている理由についても解説する。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="0xfffrog" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:0xfffrog;" data-marpit-pagination-total="20">
<h2 id="%E3%81%9D%E3%82%82%E3%81%9D%E3%82%82%E3%83%95%E3%83%A9%E3%82%AF%E3%82%BF%E3%83%AB%E3%81%A8%E3%81%AF">そもそもフラクタルとは?</h2>
<p>フラクタル図形とは、その一部を拡大しても、元の図形と同じくらい複雑な図形のこと。<br />
<img src="../img/20260310Koch_edited.png" alt="" style="width:520px;" /><img src="../img/weierstrass_edited.png" alt="" style="width:340px;" /><img src="../img/weierstrasszoom.png" alt="" style="width:340px;" /></p>
<h3 id="%E7%9B%B8%E6%80%A7%E3%81%AE%E6%82%AA%E3%81%95">相性の悪さ</h3>
<p>接線(= 微係数)が至るところで存在しない連続な曲線の例 : コッホ曲線、Weierstrass関数<br />
<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> そのような曲線はどれも「フラクタル」となり、逆に、複雑なフラクタル図形は微係数を持たない。これが相性の悪さの例となる。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="0xfffrog" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:0xfffrog;" data-marpit-pagination-total="20">
<h1 id="2-%E5%88%86%E6%95%B0%E6%AC%A1%E5%85%83">2. 分数次元</h1>
<p>フラクタル図形の次元は、整数でないことがある。<br />
そして、分数次元図形の体積を求めることは一般に非常に難しい。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="0xfffrog" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:0xfffrog;" data-marpit-pagination-total="20">

<h1 id="3-%E5%88%86%E6%95%B0%E9%9A%8E%E5%BE%AE%E7%A9%8D%E5%88%86">3. 分数階微積分</h1>
<p>定積分を繰り返し行う操作を、累次積分という。<br />
累次積分の回数は非整数回に拡張でき、これを「分数階積分」という。<br />
ここから定義される「分数階」の微積分を用いると、<br />
ある種の分数次元図形の体積を解析的に求めることができる。</p>
</section>

<p>さきのグラフは2つの意味で不正確である :</p>
<div class="flex_div">

<p><img src="../img/ternary_corn.png" alt="" style="width:500px;" /></p>
  </div>
  <div>
